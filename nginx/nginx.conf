# Remplace api.tondomaine.com par ton vrai domaine

server {
    listen 80;
    server_name api.tondomaine.com;

    # Requis pour certbot (validation Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.tondomaine.com;

    ssl_certificate     /etc/letsencrypt/live/api.tondomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tondomaine.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Timeout long pour les scans Playwright
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
