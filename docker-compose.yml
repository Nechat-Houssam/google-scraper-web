services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    shm_size: '256mb'

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
